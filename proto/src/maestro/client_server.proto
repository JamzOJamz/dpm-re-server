syntax = "proto2";
package diepio.proto;

import "maestro_user.proto";

message EnterGameRequest {
}

message EnterGameResponse {
    required string host = 1;
    required int32 port = 2;
}

extend maestro.user_proto.Msg {
    optional EnterGameRequest enter_game_request_field = 120;
    optional EnterGameResponse enter_game_response_field = 121;
}
